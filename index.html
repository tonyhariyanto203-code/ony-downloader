<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONY Downloader - Versi 47 </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #0b0f19;
            font-family: system-ui, -apple-system, sans-serif;
            /* Mencegah scroll berlebih di HP */
            overflow-x: hidden; 
        }
        /* Efek animasi fade-in halus */
        .animate-fade {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm bg-gray-900 border border-cyan-500/30 rounded-2xl shadow-[0_0_20px_rgba(6,182,212,0.15)] p-5 space-y-5 animate-fade">
        
        <div class="text-center">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-wider">
                ONY DOWNLOADER
            </h1>
            <p class="text-[10px] text-gray-400 mt-0.5 tracking-wide uppercase">Hanya untuk pribadi, BUKAN UNTUK TUJUAN KOMERSIL</p>
        </div>

        <div class="space-y-2">
            <label class="text-xs font-semibold text-gray-400 block">Link Video YouTube:</label>
            <div class="flex gap-2">
                <input type="text" id="url_input" placeholder="Paste link di sini..." 
                       class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-cyan-500 text-gray-100 placeholder-gray-500">
                <button onclick="prosesCekVideo()" id="btn_cek" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold px-4 rounded-xl text-xs transition-all shadow-md active:scale-95 whitespace-nowrap">
                    CEK VIDEO
                </button>
            </div>
        </div>

        <div id="loading_status" class="hidden text-center p-3 bg-gray-800/40 border border-gray-800 rounded-xl">
            <div class="inline-block animate-spin rounded-full h-4 w-4 border-2 border-cyan-500 border-t-transparent mr-2 vertical-middle"></div>
            <span id="loading_text" class="text-xs text-amber-400 font-medium">Menghubungkan ke dapur API...</span>
        </div>

        <div id="error_box" class="hidden bg-red-950/40 border border-red-500/50 text-red-400 text-xs p-3 rounded-xl text-center">
            ⚠️ Gagal memuat data video. Coba lagi!
        </div>

        <div id="panel_hasil" class="hidden space-y-4 border-t border-gray-800 pt-4 animate-fade">
            <div class="flex gap-3 bg-gray-800/40 p-2.5 rounded-xl border border-gray-800">
                <img id="vid_thumb" src="" class="w-24 h-16 object-cover rounded-lg shadow-md border border-gray-700">
                <div class="flex flex-col justify-center">
                    <h3 id="vid_title" class="text-xs font-bold text-gray-100 line-clamp-2">Judul Video YouTube Lu</h3>
                </div>
            </div>

            <button onclick="eksekusiDownload()" id="btn_download" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-3 rounded-xl text-xs transition-all shadow-lg active:scale-95 shadow-emerald-950/30 tracking-wider uppercase">
                📥 DOWNLOAD MP3 SEKARANG
            </button>
        </div>

    </div>

    <script>
        // --- CONFIG SERVER LU ---
        // Masukkan API Key lu yang lolos tadi di sini bro!
        const CONFIG_API_KEY = "e159f9ad53msha5e4abbd1ff7a87p108530jsn014f9cb586df";
        const CONFIG_API_HOST = "yt-search-and-download-mp3.p.rapidapi.com";

        // Variabel global penampung hasil respond
        let dataDownloadMateng = "";
        let judulVideoAsli = "ony_downloader.mp3";

        // Otomatis jalan pas halaman kebuka di HP / Kodular WebViewer
        window.onload = function() {
            // Tangkap parameter ?url= dari fitur share intent Kodular
            const urlParams = new URLSearchParams(window.location.search);
            const sharedUrl = urlParams.get('url');
            
            if (sharedUrl) {
                document.getElementById('url_input').value = sharedUrl;
                prosesCekVideo(); // Langsung gass eksekusi cek otomatis
            }
        };

        function prosesCekVideo() {
            const urlTarget = document.getElementById('url_input').value.trim();
            if (!urlTarget) {
                alert("Link kosong bro, paste dulu link-nya!");
                return;
            }

            // Atur UI Loading
            document.getElementById('error_box').classList.add('hidden');
            document.getElementById('panel_hasil').classList.add('hidden');
            document.getElementById('loading_status').classList.remove('hidden');
            document.getElementById('loading_text').innerText = "Menghubungkan ke dapur API...";
            document.getElementById('btn_cek').disabled = true;

            // Encode url biar aman dikirim lewat parameter GET
            const apiUrl = `https://${CONFIG_API_HOST}/mp3?url=${encodeURIComponent(urlTarget)}`;

            // Tembak API Pake fetch standar browser (Tanpa butuh Python server lagi!)
            fetch(apiUrl, {
                method: 'GET',
                headers: {
                    'x-rapidapi-host': CONFIG_API_HOST,
                    'x-rapidapi-key': CONFIG_API_KEY,
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading_status').classList.add('hidden');
                document.getElementById('btn_cek').disabled = false;

                if (data.success === true || data.download) {
                    // Simpan data ke variabel global
                    dataDownloadMateng = data.download;
                    judulVideoAsli = (data.title ? data.title : "Ony_Downloader") + ".mp3";

                    // Update UI Tampilan Panel Hasil
                    document.getElementById('vid_title').innerText = data.title || "Audio Terdeteksi";
                    
                    // Trick generate dummy thumbnail biar hemat kuota request API lain
                    // Mengambil ID video YouTube dari URL asal
                    let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                    let match = urlTarget.match(regExp);
                    if (match && match[2].length == 11) {
                        document.getElementById('vid_thumb').src = `https://img.youtube.com/vi/${match[2]}/hqdefault.jpg`;
                    } else {
                        document.getElementById('vid_thumb').src = "https://placehold.co/120x80/1f2937/a5f3fc?text=Audio";
                    }

                    // Tampilkan panel hasil
                    document.getElementById('panel_hasil').classList.remove('hidden');
                } else {
                    tampilkanError();
                }
            })
            .catch(err => {
                console.error(err);
                tampilkanError();
            });
        }

        function eksekusiDownload() {
            if (!dataDownloadMateng) return;

            // Ubah teks tombol pas lagi proses download gaib
            const btn = document.getElementById('btn_download');
            const statusBox = document.getElementById('loading_status');
            const statusTxt = document.getElementById('loading_text');
            
            btn.disabled = true;
            statusBox.classList.remove('hidden');
            statusTxt.innerText = "Sedang menyalin file & mengunci nama judul asli... Harap tunggu!";

            // JURUS SAKTI BLOB FETCHING: Mengatasi nama acak rongsokan dari server API
            fetch(dataDownloadMateng)
                .then(response => {
                    if (!response.ok) throw new Error("Gagal mengunduh file dari server penyedia.");
                    return response.blob();
                })
                .then(blob => {
                    // Bikin Virtual Link download di memori browser HP
                    let blobUrl = window.URL.createObjectURL(blob);
                    let virtualLink = document.createElement('a');
                    virtualLink.href = blobUrl;
                    
                    // MAKSA SISTEM HP UNTUK SIMPAN PAKE JUDUL ASLI YOUTUBE NYA!
                    virtualLink.download = judulVideoAsli; 
                    
                    document.body.appendChild(virtualLink);
                    virtualLink.click(); // Trigger klik download gaib
                    
                    // Bersihkan memori kembali
                    virtualLink.remove();
                    window.URL.revokeObjectURL(blobUrl);

                    // Kembalikan UI normal
                    statusBox.classList.add('hidden');
                    btn.disabled = false;
                })
                .catch(err => {
                    alert("Aksi download diblokir atau gagal. Silahkan coba klik lagi / ganti link!");
                    statusBox.classList.add('hidden');
                    btn.disabled = false;
                });
        }

        function tampilkanError() {
            document.getElementById('loading_status').classList.add('hidden');
            document.getElementById('btn_cek').disabled = false;
            document.getElementById('error_box').classList.remove('hidden');
        }
    </script>
</body>
</html>
